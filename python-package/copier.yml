# Project metadata

project_name:
  type: str
  validator: "{% if not project_name %}Required{% endif %}"

package_name:
  type: str
  default: "{{ project_name | replace('-', '_') }}"

project_author:
  type: str
  default: "andrey4ik21pro1"

version:
  type: str
  default: "1.0.0"

# git

use_github:
  type: bool
  default: true

# copier

_exclude:
  - copier.yml
  - __pycache__
  - "{% if not use_github %}.github/**{% endif %}"
  - "{% if not use_github %}.github{% endif %}"