# Project metadata

project_name:
  type: str
  default: "{{ _folder_name }}"

use_docker:
  type: bool
  default: false

# copier

_exclude:
  - copier.yml
  - __pycache__

  - "{% if not use_docker %}Dockerfile{% endif %}"
  - "{% if not use_docker %}docker-compose.yml{% endif %}"

_tasks:
  - move ".env.example" ".env" >nul 2>&1