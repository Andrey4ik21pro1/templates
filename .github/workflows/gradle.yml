name: Update Gradle Wrapper

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest Gradle version
        id: gradle
        run: |
          VERSION=$(curl -s "https://services.gradle.org/versions/current" | jq -r ".version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update gradle_version.default in android-project/copier.yml
        run: |
          sed -i "/gradle_version:/,/default:/ s/default: \".*\"/default: \"${{ steps.gradle.outputs.version }}\"/" android-project/copier.yml

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add android-project/copier.yml && git commit -m "chore: update gradle wrapper to ${{ steps.gradle.outputs.version }}" && git push)